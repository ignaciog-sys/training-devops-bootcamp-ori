services:
  api:
    build: ./backend
    ports:
      - "${API_PORT}:3001"
    environment:
      - PORT=3001
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-}
      - NODE_ENV=production
    volumes:
      - api-data:/app/data
    networks:
      - promptlab
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - api
    networks:
      - promptlab
    restart: unless-stopped

networks:
  promptlab:

volumes:
  api-data:
