apiVersion: apps/v1
kind: Deployment
metadata:
  name: promptlab-api
  namespace: promptlab
  labels:
    app.kubernetes.io/name: promptlab
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: promptlab
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promptlab
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: promptlab-api:v1
          ports:
            - containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: promptlab-api-config
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: promptlab-data
