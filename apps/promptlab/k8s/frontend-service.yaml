apiVersion: v1
kind: Service
metadata:
  name: promptlab-frontend
  namespace: promptlab
  labels:
    app.kubernetes.io/name: promptlab
    app.kubernetes.io/component: frontend
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: promptlab
    app.kubernetes.io/component: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
