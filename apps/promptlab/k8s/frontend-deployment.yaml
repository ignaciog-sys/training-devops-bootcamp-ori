apiVersion: apps/v1
kind: Deployment
metadata:
  name: promptlab-frontend
  namespace: promptlab
  labels:
    app.kubernetes.io/name: promptlab
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: promptlab
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promptlab
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: promptlab-frontend:v1
          ports:
            - containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
