<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptLab</title>
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --card: #1a1a26;
    --accent: #00a3e0; --accent2: #00d4aa; --danger: #ff5f57;
    --text: #f0eff4; --muted: #8a8a9a; --dim: #55556a;
    --border: rgba(255,255,255,0.06); --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Layout */
  .app { display: grid; grid-template-columns: 280px 1fr 1fr; grid-template-rows: auto 1fr; height: 100vh; }
  header { grid-column: 1 / -1; padding: 1rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 1.3rem; font-weight: 700; }
  .logo span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .mode-badge { font-size: 0.7rem; padding: 0.25rem 0.6rem; border-radius: 100px; background: rgba(0,212,170,0.15); color: var(--accent2); font-weight: 600; }

  /* Sidebar */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
  .sidebar-header { padding: 1rem; display: flex; gap: 0.5rem; }
  .sidebar-header input { flex: 1; padding: 0.5rem 0.75rem; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem; outline: none; }
  .sidebar-header input:focus { border-color: var(--accent); }
  .categories { padding: 0 0.75rem; display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.75rem; }
  .cat-btn { padding: 0.2rem 0.5rem; font-size: 0.7rem; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .cat-btn:hover, .cat-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .prompt-list { flex: 1; overflow-y: auto; padding: 0 0.5rem; }
  .prompt-item { padding: 0.75rem; margin-bottom: 0.3rem; border-radius: var(--radius); cursor: pointer; border: 1px solid transparent; transition: all 0.15s; }
  .prompt-item:hover { background: var(--card); }
  .prompt-item.active { background: var(--card); border-color: var(--accent); }
  .prompt-item h3 { font-size: 0.85rem; margin-bottom: 0.2rem; font-weight: 500; }
  .prompt-item p { font-size: 0.7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .prompt-item .meta { display: flex; justify-content: space-between; margin-top: 0.3rem; }
  .prompt-item .meta span { font-size: 0.65rem; color: var(--dim); }
  .stars { color: #febc2e; letter-spacing: 1px; }

  /* Editor */
  .editor { padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
  .editor-empty { display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 1.1rem; }
  .field label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.08em; }
  .field input, .field select, .field textarea { width: 100%; padding: 0.6rem 0.75rem; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; font-family: inherit; outline: none; resize: vertical; }
  .field textarea { min-height: 150px; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.85rem; line-height: 1.6; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .editor-actions { display: flex; gap: 0.5rem; }
  .btn { padding: 0.55rem 1.2rem; border-radius: 8px; border: none; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(255,95,87,0.3); }
  .btn-danger:hover { background: rgba(255,95,87,0.1); }
  .btn-run { background: linear-gradient(135deg, #febc2e, #ff9500); color: #1a1a1a; font-weight: 600; }
  .btn-run:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Response panel */
  .responses { background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
  .responses-empty { display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 0.95rem; text-align: center; line-height: 1.6; }
  .response-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
  .response-card .meta { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.7rem; color: var(--dim); }
  .response-card .model { color: var(--accent); font-weight: 600; }
  .response-card .body { font-size: 0.85rem; color: var(--muted); line-height: 1.7; white-space: pre-wrap; }
  .response-card .body code { background: var(--surface); padding: 0.15rem 0.4rem; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
  .response-card .body pre { background: var(--surface); padding: 0.75rem; border-radius: 8px; overflow-x: auto; margin: 0.5rem 0; }
  .response-card .body pre code { background: none; padding: 0; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* New prompt button */
  .new-btn { margin: 0.75rem; padding: 0.6rem; border-radius: var(--radius); border: 1px dashed var(--border); background: transparent; color: var(--accent); font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
  .new-btn:hover { background: var(--card); border-color: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><span>PromptLab</span></div>
    <div class="mode-badge" id="mode-badge">MOCK</div>
  </header>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <input type="text" id="search" placeholder="Buscar prompts...">
    </div>
    <div class="categories" id="categories"></div>
    <button class="new-btn" id="new-btn">+ Nuevo prompt</button>
    <div class="prompt-list" id="prompt-list"></div>
  </div>

  <!-- Editor -->
  <div class="editor" id="editor">
    <div class="editor-empty">Selecciona o crea un prompt</div>
  </div>

  <!-- Responses -->
  <div class="responses" id="responses">
    <div class="responses-empty">Ejecuta un prompt para ver las respuestas del LLM</div>
  </div>
</div>

<script>
const API = window.location.hostname === 'localhost' && window.location.port === '5173'
  ? 'http://localhost:3001'
  : '/api/..'.replace('/api/..', '');

let prompts = [];
let currentId = null;
let activeCategory = null;

// --- Fetch helpers ---
async function api(path, opts = {}) {
  const res = await fetch(`${API}${path}`, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  return res.json();
}

// --- Load data ---
async function loadPrompts() {
  const params = new URLSearchParams();
  if (activeCategory) params.set('category', activeCategory);
  const q = document.getElementById('search').value.trim();
  if (q) params.set('search', q);
  prompts = await api(`/api/prompts?${params}`);
  renderList();
}

async function loadCategories() {
  const cats = await api('/api/categories');
  const el = document.getElementById('categories');
  el.innerHTML = `<button class="cat-btn ${!activeCategory ? 'active' : ''}" data-cat="">Todos</button>` +
    cats.map(c => `<button class="cat-btn ${activeCategory === c.category ? 'active' : ''}" data-cat="${c.category}">${c.category} (${c.count})</button>`).join('');
  el.querySelectorAll('.cat-btn').forEach(btn => {
    btn.onclick = () => { activeCategory = btn.dataset.cat || null; loadCategories(); loadPrompts(); };
  });
}

// --- Render sidebar ---
function renderList() {
  const el = document.getElementById('prompt-list');
  el.innerHTML = prompts.map(p => `
    <div class="prompt-item ${p.id === currentId ? 'active' : ''}" data-id="${p.id}">
      <h3>${esc(p.title)}</h3>
      <p>${esc(p.content.substring(0, 60))}</p>
      <div class="meta">
        <span class="stars">${'★'.repeat(p.rating)}${'☆'.repeat(5 - p.rating)}</span>
        <span>${p.category}</span>
      </div>
    </div>
  `).join('');
  el.querySelectorAll('.prompt-item').forEach(item => {
    item.onclick = () => selectPrompt(Number(item.dataset.id));
  });
}

// --- Select prompt ---
async function selectPrompt(id) {
  currentId = id;
  renderList();
  const p = prompts.find(x => x.id === id);
  if (!p) return;
  renderEditor(p);
  const responses = await api(`/api/prompts/${id}/responses`);
  renderResponses(responses);
}

// --- Render editor ---
function renderEditor(p) {
  const el = document.getElementById('editor');
  el.innerHTML = `
    <div class="field"><label>Titulo</label><input type="text" id="ed-title" value="${esc(p.title)}"></div>
    <div class="field"><label>Categoria</label>
      <select id="ed-cat">
        ${['general','codigo','educacion','investigacion','datos','ia'].map(c =>
          `<option value="${c}" ${p.category===c?'selected':''}>${c}</option>`
        ).join('')}
      </select>
    </div>
    <div class="field"><label>Prompt</label><textarea id="ed-content">${esc(p.content)}</textarea></div>
    <div class="field"><label>Rating</label>
      <div id="ed-rating" style="font-size:1.3rem;cursor:pointer;color:#febc2e;">${ratingHtml(p.rating)}</div>
    </div>
    <div class="editor-actions">
      <button class="btn btn-run" id="btn-run">Ejecutar</button>
      <button class="btn btn-primary" id="btn-save">Guardar</button>
      <button class="btn btn-danger" id="btn-delete">Borrar</button>
    </div>
  `;
  document.getElementById('btn-save').onclick = savePrompt;
  document.getElementById('btn-delete').onclick = deletePrompt;
  document.getElementById('btn-run').onclick = runPrompt;
  setupRating(p.rating);
}

function ratingHtml(n) {
  return Array.from({length:5}, (_,i) => i < n ? '★' : '☆').join('');
}

function setupRating(current) {
  const el = document.getElementById('ed-rating');
  el.dataset.value = current;
  el.innerHTML = ratingHtml(current);
  for (let i = 1; i <= 5; i++) {
    const star = document.createElement('span');
    // Use event delegation on parent
  }
  el.onclick = (e) => {
    const rect = el.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const starWidth = rect.width / 5;
    const val = Math.min(5, Math.max(1, Math.ceil(x / starWidth)));
    el.dataset.value = val;
    el.innerHTML = ratingHtml(val);
  };
}

// --- Save ---
async function savePrompt() {
  const data = {
    title: document.getElementById('ed-title').value,
    content: document.getElementById('ed-content').value,
    category: document.getElementById('ed-cat').value,
    rating: Number(document.getElementById('ed-rating').dataset.value),
  };
  await api(`/api/prompts/${currentId}`, { method: 'PUT', body: JSON.stringify(data) });
  await loadPrompts();
  await loadCategories();
  selectPrompt(currentId);
}

// --- Delete ---
async function deletePrompt() {
  if (!confirm('Borrar este prompt?')) return;
  await api(`/api/prompts/${currentId}`, { method: 'DELETE' });
  currentId = null;
  document.getElementById('editor').innerHTML = '<div class="editor-empty">Selecciona o crea un prompt</div>';
  document.getElementById('responses').innerHTML = '<div class="responses-empty">Ejecuta un prompt para ver las respuestas del LLM</div>';
  await loadPrompts();
  await loadCategories();
}

// --- Run ---
async function runPrompt() {
  const btn = document.getElementById('btn-run');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Ejecutando...';
  try {
    await api(`/api/prompts/${currentId}/run`, { method: 'POST' });
    const responses = await api(`/api/prompts/${currentId}/responses`);
    renderResponses(responses);
  } catch (err) {
    alert('Error: ' + err.message);
  }
  btn.disabled = false;
  btn.textContent = 'Ejecutar';
}

// --- Render responses ---
function renderResponses(list) {
  const el = document.getElementById('responses');
  if (!list.length) {
    el.innerHTML = '<div class="responses-empty">Sin respuestas aun. Pulsa "Ejecutar" para probar el prompt.</div>';
    return;
  }
  el.innerHTML = list.map(r => `
    <div class="response-card">
      <div class="meta">
        <span class="model">${esc(r.model)}</span>
        <span>${r.duration_ms}ms &middot; ${new Date(r.created_at).toLocaleString()}</span>
      </div>
      <div class="body">${formatResponse(r.response)}</div>
    </div>
  `).join('');
}

function formatResponse(text) {
  return esc(text)
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
}

// --- New prompt ---
document.getElementById('new-btn').onclick = async () => {
  const p = await api('/api/prompts', {
    method: 'POST',
    body: JSON.stringify({ title: 'Nuevo prompt', content: 'Escribe tu prompt aqui...', category: 'general' }),
  });
  await loadPrompts();
  await loadCategories();
  selectPrompt(p.id);
};

// --- Search ---
let searchTimeout;
document.getElementById('search').oninput = () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(loadPrompts, 300);
};

// --- Utils ---
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// --- Check mode ---
async function checkMode() {
  const h = await api('/health');
  // If server returns info about mode, update badge
  document.getElementById('mode-badge').textContent = 'CONECTADO';
  document.getElementById('mode-badge').style.background = 'rgba(0,212,170,0.15)';
}

// --- Init ---
(async () => {
  await loadCategories();
  await loadPrompts();
  checkMode();
})();
</script>
</body>
</html>
